apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-agent-boilerplate
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: python-agent-boilerplate
spec:
  rules:
    - host: agent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: python-agent-boilerplate
                port:
                  name: http
