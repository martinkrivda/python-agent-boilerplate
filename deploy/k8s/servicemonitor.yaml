apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: python-agent-boilerplate
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: python-agent-boilerplate
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: python-agent-boilerplate
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
