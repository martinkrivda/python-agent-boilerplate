services:
  ai-agent-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_PROVIDER: ollama
      AI_MODEL: qwen3:8b
      AI_BASE_URL: http://ollama:11434/v1
      AI_API_KEY: ollama
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
